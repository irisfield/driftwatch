name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run type-check
        working-directory: packages/eval-core
      - run: bun run test
        working-directory: packages/eval-core

  retrieval-gate:
    needs: unit
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Localhost DSN for the service container — not a secret
      EVAL_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: apply migration
        run: psql $EVAL_DATABASE_URL -f supabase/migrations/20260528000000_init.sql
        env:
          PGPASSWORD: postgres

      - name: restore embed cache
        uses: actions/cache@v5
        with:
          path: .driftwatch-cache/embeddings
          key: embeds-${{ hashFiles('golden/supabase.json') }}

      # supabase corpus uses a pinned URL list (corpus-config.ts), not a live sitemap
      # fetch, so the same 30 pages are ingested every run regardless of --limit.
      - name: ingest corpus
        run: |
          bun run packages/ingest/src/cli.ts \
            --corpus supabase \
            --cache-dir .driftwatch-cache/embeddings
        env:
          DATABASE_URL: ${{ env.EVAL_DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: retrieval gate
        run: bun run scripts/assert-no-regression.ts --corpus supabase
        env:
          DATABASE_URL: ${{ env.EVAL_DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # Non-blocking diagnostic — never fails the build
      - name: judge report (supabase)
        continue-on-error: true
        run: bun run scripts/run-judge.ts --corpus supabase --sample 5
        env:
          DATABASE_URL: ${{ env.EVAL_DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JUDGE_API_KEY: ${{ secrets.JUDGE_API_KEY }}
          JUDGE_MODEL: gemini-2.5-flash-lite

      - name: restore embed cache (github)
        uses: actions/cache@v5
        with:
          path: .driftwatch-cache/embeddings
          key: embeds-github-${{ hashFiles('golden/github.json') }}

      # github corpus uses a pinned URL list; scrapes GitHub REST API reference docs
      # which are structurally distinct from the tutorial-style supabase/postgres corpora.
      - name: ingest corpus (github)
        run: |
          bun run packages/ingest/src/cli.ts \
            --corpus github \
            --cache-dir .driftwatch-cache/embeddings
        env:
          DATABASE_URL: ${{ env.EVAL_DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      # retrieval gate and judge for github are pending baseline generation:
      # run scripts/run-eval.ts --corpus github and scripts/calibrate-thresholds.ts
      # --corpus github after the first successful ingest, then commit
      # golden/github-baseline.json and re-add these steps.

      - name: restore embed cache (postgres)
        uses: actions/cache@v5
        with:
          path: .driftwatch-cache/embeddings
          key: embeds-postgres-${{ hashFiles('golden/postgres.json') }}

      # postgres corpus uses a pinned URL list (corpus-config.ts), not a live sitemap
      # fetch, so the same 30 pages are ingested every run regardless of --limit.
      - name: ingest corpus (postgres)
        run: |
          bun run packages/ingest/src/cli.ts \
            --corpus postgres \
            --cache-dir .driftwatch-cache/embeddings
        env:
          DATABASE_URL: ${{ env.EVAL_DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: retrieval gate (postgres)
        run: bun run scripts/assert-no-regression.ts --corpus postgres
        env:
          DATABASE_URL: ${{ env.EVAL_DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: judge report (postgres)
        continue-on-error: true
        run: bun run scripts/run-judge.ts --corpus postgres --sample 5
        env:
          DATABASE_URL: ${{ env.EVAL_DATABASE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JUDGE_API_KEY: ${{ secrets.JUDGE_API_KEY }}
          JUDGE_MODEL: gemini-2.5-flash-lite

      - name: upload current reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: retrieval-reports
          path: |
            golden/supabase-current.json
            golden/supabase-judge-report.json
            golden/postgres-current.json
            golden/postgres-judge-report.json
          retention-days: 30
          if-no-files-found: warn
